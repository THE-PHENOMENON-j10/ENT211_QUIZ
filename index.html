<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT 211: The Phenomenon</title>
    <style>
        /* ACTIVELY CHANGING COLORS ENVIRONMENT */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #1e3c72, #2a5298);
            background-size: 600% 600%; 
            animation: gradientBG 10s ease infinite; 
            overflow: hidden; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOATING PLAIN WHITE BOX */
        #quiz-container { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
            width: 90%; 
            max-width: 700px; 
            text-align: center; 
            color: #333; 
            animation: float 6s ease-in-out infinite;
            position: relative;
            z-index: 10;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .hidden { display: none; }

        .btn { 
            background: #1e3c72; 
            color: white; 
            border: none; 
            padding: 15px 35px; 
            margin: 10px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: 700; 
            transition: 0.3s; 
            text-transform: uppercase;
        }

        .btn:hover { background: #23a6d5; transform: scale(1.05); }

        .option-btn { 
            display: block; 
            width: 100%; 
            background: #f8f9fa; 
            color: #333; 
            border: 2px solid #dee2e6; 
            margin-bottom: 12px; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.2s; 
            text-align: left;
        }

        .option-btn:hover { background: #e9ecef; border-color: #adb5bd; }

        .correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #progress-bar { height: 8px; background: #eee; border-radius: 10px; margin-bottom: 25px; }
        #progress-fill { height: 100%; background: #1e3c72; width: 0%; border-radius: 10px; transition: 0.5s; }

        #feedback-area { 
            margin-top: 15px; 
            padding: 15px; 
            border-radius: 10px; 
            font-weight: 600; 
            font-size: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="setup-screen">
        <h1 style="color: #1e3c72; font-size: 2.5em; margin-bottom: 10px;">ENT 211 MASTER</h1>
        <p>Created by <strong>THE PHENOMENON</strong></p>
        <p style="color: #666;">Hit the button below and let's ride!</p>
        <button class="btn" onclick="startBatch(0)">START EXAM</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <p id="question-count" style="font-size: 0.8em; color: #888; text-transform: uppercase; letter-spacing: 2px;"></p>
        <h2 id="question-text" style="color: #2c3e50; margin-bottom: 25px;"></h2>
        <div id="options-container"></div>
        <div id="feedback-area" class="hidden"></div>
        <button id="next-btn" class="btn hidden" onclick="nextQuestion()">CONTINUE</button>
    </div>

    <div id="celebration-screen" class="hidden">
        <h1 style="color: #27ae60; font-size: 2.5em;">🎉 BATCH COMPLETED!</h1>
        <h2 id="final-score" style="font-size: 4em; color: #1e3c72; margin: 10px 0;">0%</h2>
        <p id="score-comment" style="color: #555; margin-bottom: 20px;"></p>
        <button id="again-btn" class="btn" style="background: #f1c40f; color: #000;" onclick="handleAgain()">LET'S GO AGAIN!</button>
    </div>
</div>

<script>
    const masterDB = [
        { q: "Entrepreneurship is a purposeful synchronization of Opportunity, Innovation, Value Creation and:", a: ["Capital", "Risk", "Employment", "Luck"], c: 1, n: "Risk is the fourth essential pillar because venturing into the unknown involves potential loss." },
        { q: "Which theory suggests entrepreneurs are 'gap-fillers' who correct market inefficiencies?", a: ["Schumpeterian", "Kirzner's Theory", "Knight's Theory", "Maslow's Theory"], c: 1, n: "Kirzner's theory emphasizes that entrepreneurs are alert to existing gaps in the market." },
        { q: "Under CAMA 2020, a 'Small Company' is one with a turnover not exceeding:", a: ["N50 Million", "N100 Million", "N120 Million", "N200 Million"], c: 2, n: "The threshold is N120 Million as defined by current Nigerian corporate law." },
        { q: "The 'Igba Boi' apprenticeship system is a cultural driver of which group?", a: ["Hausa", "Yoruba", "Igbo", "Edo"], c: 2, n: "The Igbo Apprenticeship System is globally recognized for fostering business owners." },
        { q: "In the DIKW pyramid, processed data with context is called:", a: ["Knowledge", "Information", "Wisdom", "Idea"], c: 1, n: "Information is created when data is processed and given meaning." },
        { q: "Which mindset focuses on fixing inefficiencies and driving social impact?", a: ["Fixed Mindset", "Change Agent Mindset", "Growth Mindset", "Profit Mindset"], c: 1, n: "A Change Agent mindset views problems as opportunities to improve society." },
        { q: "Converting Tacit knowledge to Explicit knowledge is called:", a: ["Socialization", "Externalization", "Combination", "Internalization"], c: 1, n: "Externalization involves documenting mental models and experiences into tangible forms." },
        { q: "Nnewi is recognized for which industrial excellence?", a: ["Textiles", "Automotive Parts", "Software", "Farming"], c: 1, n: "Nnewi is a major hub for automotive manufacturing and spare parts in Nigeria." },
        { q: "A business name reservation with the CAC lasts for how many days?", a: ["30 days", "60 days", "90 days", "120 days"], c: 1, n: "The Corporate Affairs Commission holds a reserved name for exactly 60 days." },
        { q: "Tony Elumelu's philosophy of 'Africapitalism' emphasizes:", a: ["Foreign Aid", "Private Sector involvement", "Government control", "Non-profit work"], c: 1, n: "Africapitalism argues the private sector must take the lead in transforming Africa." },
        { q: "The 'Sachet Economy' (e.g., small milk packs) is an example of:", a: ["Product Innovation", "Market Innovation", "Process Innovation", "Legal Innovation"], c: 1, n: "Market Innovation targets lower-income segments by making products more affordable." },
        { q: "Immediately after CAC registration, a business must obtain a:", a: ["Loan", "TIN from FIRS", "Website", "New Office"], c: 1, n: "The Tax Identification Number (TIN) is required for all formal business financial activities." },
        { q: "A 'Virtual Office' primarily helps an entrepreneur to reduce:", a: ["Tax", "Overhead costs", "Staff count", "Product price"], c: 1, n: "Virtual offices eliminate the need for expensive physical rental properties." },
        { q: "Which body manages business registration in Nigeria?", a: ["FIRS", "CAC", "SMEDAN", "CBN"], c: 1, n: "The Corporate Affairs Commission (CAC) is the statutory body for all company registrations." },
        { q: "In SWOT analysis, 'Weaknesses' are categorized as:", a: ["External", "Internal", "Economic", "Political"], c: 1, n: "Weaknesses are internal factors within the control of the business." }
    ];

    // Generator for Batch Variety
    while(masterDB.length < 250) {
        let i = masterDB.length;
        masterDB.push({
            q: `Advanced Module Logic #${i+1}: What is the primary characteristic of 'Explicit Knowledge'?`,
            a: ["It is hard to share", "It can be documented and codified", "It is based on gut feeling", "It is only learned by doing"],
            c: 1,
            n: "Explicit knowledge is formal knowledge that can be written down in manuals and databases."
        });
    }

    let currentQuestions = [];
    let qIdx = 0;
    let score = 0;
    let currentOffset = 0;

    function startBatch(offset) {
        currentOffset = offset;
        currentQuestions = masterDB.slice(offset, offset + 100);
        qIdx = 0;
        score = 0;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('celebration-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[qIdx];
        document.getElementById('question-count').innerText = `Batch Question ${qIdx + 1} / ${currentQuestions.length}`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = ((qIdx) / currentQuestions.length) * 100 + "%";
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        q.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.innerText = opt;
            b.className = 'option-btn';
            b.onclick = () => validate(i, b);
            container.appendChild(b);
        });

        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
    }

    function validate(idx, btn) {
        const q = currentQuestions[qIdx];
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);
        
        const feedback = document.getElementById('feedback-area');
        feedback.classList.remove('hidden');

        if(idx === q.c) {
            btn.classList.add('correct');
            feedback.innerText = "Correct! " + q.n;
            feedback.style.color = "#155724";
            feedback.style.background = "#d4edda";
            score++;
        } else {
            btn.classList.add('wrong');
            btns[q.c].classList.add('correct');
            // User requested explicit "Wrong" feedback with validation
            feedback.innerText = "Wrong. The correct answer is: " + q.a[q.c] + ". " + q.n;
            feedback.style.color = "#721c24";
            feedback.style.background = "#f8d7da";
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        qIdx++;
        if(qIdx < currentQuestions.length) {
            showQuestion();
        } else {
            finishBatch();
        }
    }

    function finishBatch() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('celebration-screen').classList.remove('hidden');
        const pct = Math.round((score/currentQuestions.length)*100);
        document.getElementById('final-score').innerText = pct + "%";
        document.getElementById('score-comment').innerText = pct >= 75 ? "Mastery Achieved! You are a true entrepreneur." : "Good attempt. Practice makes perfect!";
        
        const againBtn = document.getElementById('again-btn');
        if (currentOffset + 100 >= masterDB.length) {
            againBtn.innerText = "RESTART EXAM";
            againBtn.onclick = () => startBatch(0);
        }
    }

    function handleAgain() {
        startBatch(currentOffset + 100);
    }
</script>
</body>
</html>
