                // Smart clean-up to prevent answer options from bleeding into the next question
                if (i === 0) {
                    q = q.replace(/^.*?(\d+\.\s*)/s, '$1'); // For the first question, clear headers
                } else {
                    // For subsequent questions, safely strip away the previous answer text
                    q = q.replace(/^[a-d]\)\s*[\s\S]*?(?=\n\s*\d+\.\s*|\n\s*[A-Z"'])/i, '');
                }
                
                // Remove the Section title headers if they exist in the middle of the string
                q = q.replace(/Section \d+:.*?(?=\n|$)/g, '').trim();
                // Finally, remove the current question's numbering (e.g., "1. ")
                q = q.replace(/^\s*\d+\.\s*/, '').trim();

                // Build the standardized object model for the quiz UI
                db.push({
                    q: q || "Review Concept: The following options determine the outcome.",
                    a: [match[2].trim(), match[3].trim(), match[4].trim(), match[5].trim()],
                    c: cIndex,
                    n: "From the Master Question Bank."
                });
            }
        }
        return db;
    }

    // Fisher-Yates Array Shuffling Algorithm ensures randomness
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    let masterDB = [];
    let currentQuestions = [];
    let qIdx = 0;
    let score = 0;

    // TIMER LOGIC VARIABLES
    let timerInterval;
    let timeRemaining = 30 * 60; // 30 minutes in seconds

    // TIMER FUNCTIONS
    function startTimer() {
        timeRemaining = 30 * 60; // Reset to 30 mins
        updateTimerDisplay();
        
        timerInterval = setInterval(() => {
            timeRemaining--;
            updateTimerDisplay();
            
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                finishBatch(); // Time's up! Force finish.
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        let minutes = Math.floor(timeRemaining / 60);
        let seconds = timeRemaining % 60;
        let display = document.getElementById('timer-display');
        
        display.innerText = `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        
        // Critical warning mode for the last 3 minutes
        if (timeRemaining <= 180) {
            display.style.animation = 'pulseTimer 1s infinite';
        } else {
            display.style.animation = 'none';
        }
    }

    function stopTimer() {
        clearInterval(timerInterval);
    }

    function startBatch() {
        if (masterDB.length === 0) {
            masterDB = initializeDB();
        }
        
        // Randomize ALL extracted questions for the session
        let shuffledDB = shuffle([...masterDB]);
        
        // Pick a batch of 100 questions 
        currentQuestions = shuffledDB.slice(0, 100); 
        qIdx = 0;
        score = 0;
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('celebration-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        startTimer(); // START TIMER HERE
        
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[qIdx];
        document.getElementById('question-count').innerText = `Batch Question ${qIdx + 1} / ${currentQuestions.length} (From 570+ Bank)`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = ((qIdx) / currentQuestions.length) * 100 + "%";
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        q.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.innerText = opt;
            b.className = 'option-btn';
            b.onclick = () => validate(i, b);
            container.appendChild(b);
        });

        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
    }

    function validate(idx, btn) {
        const q = currentQuestions[qIdx];
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);
        
        const feedback = document.getElementById('feedback-area');
        feedback.classList.remove('hidden');

        if(idx === q.c) {
            btn.classList.add('correct');
            feedback.innerText = "Spot on! ✅";
            feedback.style.color = "#155724";
            feedback.style.background = "#d4edda";
            score++;
        } else {
            btn.classList.add('wrong');
            if(btns[q.c]) btns[q.c].classList.add('correct');
            feedback.innerText = "Not quite. The correct answer was: " + q.a[q.c];
            feedback.style.color = "#721c24";
            feedback.style.background = "#f8d7da";
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        qIdx++;
        if(qIdx < currentQuestions.length) {
            showQuestion();
        } else {
            finishBatch();
        }
    }

    function finishBatch() {
        stopTimer(); // STOP TIMER HERE

        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('celebration-screen').classList.remove('hidden');
        
        const pct = Math.round((score/currentQuestions.length)*100);
        document.getElementById('final-score').innerText = pct + "%";
        
        let comment = "Good attempt. Practice makes perfect!";
        if (pct >= 90) comment = "Outstanding! You are a true entrepreneur. 🏆";
        else if (pct >= 75) comment = "Great job! Mastery is near. 🚀";
        else if (timeRemaining <= 0) comment = "Time's up! You did your best with the time you had. ⏰"; 
        
        document.getElementById('score-comment').innerText = comment;
    }
</script>
