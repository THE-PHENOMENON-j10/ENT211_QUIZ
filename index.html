<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT 211 Quiz Portal | THE PHENOMENON</title>
    <style>
        /* Animated Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #quiz-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 700px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .hidden { display: none; }

        .btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #34495e;
        }

        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: white;
            color: #333;
            border: 2px solid #ddd;
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
        }

        .correct { background: #27ae60 !important; color: white; border-color: #2ecc71; }
        .wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        #progress-fill {
            height: 100%;
            background: #3498db;
            width: 0%;
            border-radius: 4px;
            transition: width 0.4s ease-in-out;
        }

        h1 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; font-size: 0.9em; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="setup-screen">
        <h1>ENT 211 QUIZ</h1>
        <p class="subtitle">Created by <strong>THE PHENOMENON</strong></p>
        <h3>Choose Your Difficulty Level:</h3>
        <button class="btn" style="background:#27ae60" onclick="startQuiz('easy')">Easy (Foundation)</button>
        <button class="btn" style="background:#f39c12" onclick="startQuiz('difficult')">Difficult (Intermediate)</button>
        <button class="btn" style="background:#c0392b" onclick="startQuiz('professional')">Professional (Expert)</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <p id="question-count" style="font-size: 0.8em; color: #666;"></p>
        <h2 id="question-text" style="margin-bottom: 25px;"></h2>
        <div id="options-container"></div>
        <div id="feedback-area" style="margin-top: 15px; min-height: 30px; font-weight: bold;"></div>
        <button id="next-btn" class="btn hidden" style="background:#3498db" onclick="nextQuestion()">Next Slide →</button>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Assessment Complete!</h2>
        <h1 id="final-score" style="font-size: 3em; color: #27ae60;"></h1>
        <p id="performance-comment"></p>
        <button class="btn" onclick="location.reload()">Take Another Level</button>
    </div>
</div>

<script>
    // EXPANDED DATABASE: Shuffling happens in the startQuiz function
    const questionData = {
        easy: [
            { q: "Entrepreneurship is a function of (e, i, o). What does 'e' stand for?", a: ["Earnings", "Entrepreneur", "Economics", "Education"], c: 1 },
            { q: "Who coined the term 'Creative Destruction'?", a: ["Peter Drucker", "Joseph Schumpeter", "Adam Smith", "Aliko Dangote"], c: 1 },
            { q: "A 'Micro' enterprise in Nigeria has how many employees?", a: ["1-9", "10-49", "50-199", "200+"], c: 0 },
            { q: "What does CAC stand for in Nigerian business?", a: ["Central Account Center", "Corporate Affairs Commission", "Capital Alliance Corp", "Company Affairs Council"], c: 1 },
            { q: "An entrepreneur within an existing organization is a/an:", a: ["Extrapreneur", "Manager", "Intrapreneur", "Investor"], c: 2 },
            { q: "Which Nigerian state is the home of the 'Igba-Boi' system?", a: ["Lagos", "Kano", "Anambra", "Oyo"], c: 2 },
            { q: "The 'Need for Achievement' theory was by:", a: ["Maslow", "McClelland", "Drucker", "Schumpeter"], c: 1 },
            { q: "A Sole Proprietorship is owned by:", a: ["Two people", "A group", "One person", "The government"], c: 2 }
        ],
        difficult: [
            { q: "Knowledge that is hard to write down or codify is:", a: ["Explicit", "Tacit", "Virtual", "External"], c: 1 },
            { q: "In the DIKW pyramid, what does 'W' stand for?", a: ["Work", "Wealth", "Wisdom", "Wages"], c: 2 },
            { q: "Which model describes 'Unfreezing, Moving, Refreezing'?", a: ["Schumpeter Model", "Kurt Lewin Model", "SECI Model", "SWOT Model"], c: 1 },
            { q: "A 'Small Enterprise' has assets (excluding land) of:", a: ["N1m - N5m", "N10m - N100m", "N50m - N500m", "Above N1bn"], c: 2 },
            { q: "The process of starting a business with personal savings is:", a: ["Venture Capital", "Bootstrapping", "Angel Investing", "Crowdfunding"], c: 1 },
            { q: "Which dimension involves challenging competitors directly?", a: ["Autonomy", "Risk-taking", "Competitive Aggressiveness", "Innovativeness"], c: 2 },
            { q: "E-commerce stands for:", a: ["Effective Commerce", "Electronic Commerce", "Everyday Commerce", "Efficient Commerce"], c: 1 }
        ],
        professional: [
            { q: "In the SECI model, converting Tacit to Explicit is:", a: ["Socialization", "Externalization", "Combination", "Internalization"], c: 1 },
            { q: "Relational Capital refers to value from:", a: ["Employee IQ", "Software", "Customer/Supplier networks", "Patents"], c: 2 },
            { q: "Under CAMA 2020, a 'Small Company' turnover limit is:", a: ["N50m", "N100m", "N120m", "N200m"], c: 2 },
            { q: "The 'Triple Bottom Line' is Profit, People, and:", a: ["Price", "Power", "Planet", "Position"], c: 2 },
            { q: "Who is the founder of Flutterwave?", a: ["Jason Njoku", "Olugbenga Agboola", "Mitchell Elegbe", "Sim Shagaya"], c: 1 },
            { q: "A 'Company Limited by Guarantee' is usually for:", a: ["Oil & Gas", "Non-profits/Charities", "Retail", "Manufacturing"], c: 1 },
            { q: "Which Nigerian city is a hub for indigenous automotive parts?", a: ["Lagos", "Nnewi", "Aba", "Kaduna"], c: 1 }
        ]
    };

    let quizSet = [];
    let currentIdx = 0;
    let userScore = 0;

    // THE SHUFFLE UPDATE: This function now mixes questions perfectly
    function startQuiz(level) {
        // Clone the array and Shuffle it randomly
        quizSet = [...questionData[level]].sort(() => Math.random() - 0.5);
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        currentIdx = 0;
        userScore = 0;
        loadQuestion();
    }

    function loadQuestion() {
        const item = quizSet[currentIdx];
        document.getElementById('question-count').innerText = `Question ${currentIdx + 1} of ${quizSet.length}`;
        document.getElementById('question-text').innerText = item.q;
        document.getElementById('feedback-area').innerText = "";
        document.getElementById('next-btn').classList.add('hidden');

        const optionsDiv = document.getElementById('options-container');
        optionsDiv.innerHTML = "";

        item.a.forEach((opt, index) => {
            const b = document.createElement('button');
            b.innerText = opt;
            b.className = 'option-btn';
            b.onclick = () => validate(index, b);
            optionsDiv.appendChild(b);
        });

        const progress = ((currentIdx) / quizSet.length) * 100;
        document.getElementById('progress-fill').style.width = progress + "%";
    }

    function validate(choice, btn) {
        const correct = quizSet[currentIdx].c;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);

        if (choice === correct) {
            btn.classList.add('correct');
            document.getElementById('feedback-area').innerText = "CORRECT!";
            document.getElementById('feedback-area').style.color = "#27ae60";
            userScore++;
        } else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
            document.getElementById('feedback-area').innerText = "WRONG. See the green answer.";
            document.getElementById('feedback-area').style.color = "#e74c3c";
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizSet.length) {
            loadQuestion();
        } else {
            finish();
        }
    }

    function finish() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const percent = Math.round((userScore / quizSet.length) * 100);
        document.getElementById('final-score').innerText = `${percent}%`;
        
        let msg = percent >= 70 ? "Excellent revision!" : "Review the course materials again.";
        document.getElementById('performance-comment').innerText = msg;
    }
</script>
</body>
</html>
